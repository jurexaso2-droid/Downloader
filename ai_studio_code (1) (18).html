<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #0f172a; color: white; font-family: 'Segoe UI', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="glass p-6 md:p-10 rounded-3xl w-full max-w-lg shadow-2xl">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500">
                Downloader
            </h1>
            <p class="text-gray-400 mt-2 text-sm italic">Supports TikTok, FB, IG, YouTube, X</p>
        </div>

        <div class="space-y-4">
            <input type="text" id="videoUrl" 
                placeholder="Paste link here..." 
                class="w-full p-4 rounded-xl bg-slate-800 border border-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all text-white placeholder-gray-500 text-lg">
            
            <button onclick="handleDownload()" id="dlBtn"
                class="w-full bg-gradient-to-r from-blue-600 to-blue-700 hover:from-blue-500 hover:to-blue-600 text-white font-bold py-4 rounded-xl shadow-lg transition-all flex items-center justify-center gap-2 transform active:scale-95">
                <i class="fas fa-cloud-download-alt"></i> <span id="btnText">Download Now</span>
            </button>
        </div>

        <!-- Status Messaging -->
        <div id="status" class="mt-6 hidden text-center animate-pulse">
            <p id="message" class="text-blue-400 font-medium"></p>
        </div>

        <!-- Result Section -->
        <div id="videoPreview" class="mt-8 hidden space-y-4 border-t border-slate-700 pt-6">
            <div class="rounded-2xl overflow-hidden shadow-inner bg-black aspect-video flex items-center justify-center">
                <video id="player" controls class="w-full h-full"></video>
            </div>
            <div id="captionBox" class="text-sm text-gray-300 text-center px-2 italic"></div>
            <a id="saveBtn" href="#" target="_blank"
               class="block text-center bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 rounded-xl transition-all shadow-lg">
               <i class="fas fa-file-download mr-2"></i>Save MP4 Video
            </a>
        </div>
    </div>

    <script>
        async function handleDownload() {
            const urlInput = document.getElementById('videoUrl');
            const btn = document.getElementById('dlBtn');
            const status = document.getElementById('status');
            const msg = document.getElementById('message');
            const preview = document.getElementById('videoPreview');
            const player = document.getElementById('player');
            const saveBtn = document.getElementById('saveBtn');
            const captionBox = document.getElementById('captionBox');

            const videoUrl = urlInput.value.trim();
            if (!videoUrl) return alert("Please paste a link first!");

            // 1. Your API Configuration
            const API_BASE = "https://www.noobs-api.rf.gd/dipto";
            // Using a CORS proxy to bypass GitHub Pages restrictions
            const PROXY = "https://corsproxy.io/?"; 
            const FINAL_URL = `${PROXY}${encodeURIComponent(API_BASE + '/alldl?url=' + videoUrl)}`;

            // UI Setup
            preview.classList.add('hidden');
            status.classList.remove('hidden');
            btn.disabled = true;
            btn.classList.add('opacity-50');
            msg.innerText = "⏳ Connecting to API...";

            try {
                const response = await fetch(FINAL_URL);
                
                if (!response.ok) throw new Error("API Connection Failed");

                const data = await response.json();

                if (!data || !data.result) {
                    throw new Error("API could not find a video for this link.");
                }

                // API usually returns data.result (video url) and data.cp (caption)
                const downloadLink = data.result;
                const caption = data.cp || "Video successfully fetched!";

                msg.innerText = "✅ Video Found!";
                
                // Update Player and Download Button
                player.src = downloadLink;
                saveBtn.href = downloadLink;
                captionBox.innerText = caption;
                
                setTimeout(() => {
                    status.classList.add('hidden');
                    preview.classList.remove('hidden');
                }, 1000);

            } catch (err) {
                msg.innerText = "❌ Error: " + err.message;
                console.error(err);
            } finally {
                btn.disabled = false;
                btn.classList.remove('opacity-50');
            }
        }
    </script>
</body>
</html>
