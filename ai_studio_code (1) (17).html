<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Video Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #0f172a; color: white; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="glass p-8 rounded-2xl w-full max-w-lg shadow-2xl">
        <h1 class="text-3xl font-bold mb-2 text-center text-blue-400">Video Downloader</h1>
        <p class="text-gray-400 text-center mb-8 text-sm">Download videos from TikTok, FB, IG, YouTube, and X.</p>

        <div class="space-y-4">
            <input type="text" id="videoUrl" 
                placeholder="Paste video link here..." 
                class="w-full p-4 rounded-xl bg-gray-800 border border-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all text-white">
            
            <button onclick="handleDownload()" id="dlBtn"
                class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl shadow-lg transition-all flex items-center justify-center gap-2">
                <i class="fas fa-download"></i> <span id="btnText">Download Video</span>
            </button>
        </div>

        <!-- Status & Results -->
        <div id="status" class="mt-6 hidden text-center">
            <div id="loader" class="animate-spin text-blue-500 text-2xl mb-2">
                <i class="fas fa-circle-notch"></i>
            </div>
            <p id="message" class="text-sm font-medium"></p>
        </div>

        <div id="videoPreview" class="mt-6 hidden space-y-4">
            <div class="rounded-xl overflow-hidden border border-gray-700">
                <video id="player" controls class="w-full h-auto bg-black"></video>
            </div>
            <a id="saveBtn" href="#" download="video.mp4" 
               class="block text-center bg-green-600 hover:bg-green-500 text-white font-bold py-3 rounded-xl transition-all">
               <i class="fas fa-save mr-2"></i>Save to Device
            </a>
        </div>
    </div>

    <script>
        // Replace this with your actual API base URL
        const API_BASE = "https://your-api-base-url.com"; 

        async function handleDownload() {
            const urlInput = document.getElementById('videoUrl');
            const btn = document.getElementById('dlBtn');
            const btnText = document.getElementById('btnText');
            const status = document.getElementById('status');
            const msg = document.getElementById('message');
            const preview = document.getElementById('videoPreview');
            const player = document.getElementById('player');
            const saveBtn = document.getElementById('saveBtn');

            const url = urlInput.value.trim();
            if (!url) return alert("Please paste a link!");

            // Reset UI
            preview.classList.add('hidden');
            status.classList.remove('hidden');
            btn.disabled = true;
            btn.classList.add('opacity-50', 'cursor-not-allowed');
            msg.innerText = "⏳ Processing your request...";
            msg.className = "text-blue-400";

            try {
                // 1. Fetch data from your API
                const response = await fetch(`${API_BASE}/alldl?url=${encodeURIComponent(url)}`);
                const data = await response.json();

                if (!data || !data.result) {
                    throw new Error("Failed to get download link from API.");
                }

                const videoUrl = data.result;

                // 2. Update UI for success
                msg.innerText = "✅ Ready! (Fetching MP4...)";
                
                // Show in player
                player.src = videoUrl;
                saveBtn.href = videoUrl;
                
                status.classList.add('hidden');
                preview.classList.remove('hidden');

            } catch (err) {
                msg.innerText = "❎ Error: " + err.message;
                msg.className = "text-red-400 font-bold";
                console.error(err);
            } finally {
                btn.disabled = false;
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
                btnText.innerText = "Download Video";
            }
        }
    </script>
</body>
</html>
